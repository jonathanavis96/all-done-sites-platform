name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Checkout legacy branch (for /old archive of the previous site)
        uses: actions/checkout@v4
        with:
          ref: legacy
          path: legacy-src
        continue-on-error: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Built-in npm cache (faster, fewer registry hits)
          cache: "npm"
          cache-dependency-path: |
            website/package-lock.json

      - name: Configure npm retries & optional auth
        run: |
          # Retry/backoff so transient 429s don't fail the job
          {
            echo "fund=false"
            echo "audit=false"
            echo "fetch-retries=5"
            echo "fetch-retry-factor=2"
            echo "fetch-retry-mintimeout=2000"
            echo "fetch-retry-maxtimeout=60000"
          } >> ~/.npmrc

          # OPTIONAL: authenticate to reduce rate-limiting (add NPM_TOKEN in repo settings -> Secrets -> Actions)
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc
          fi

      - name: Install deps (ci)
        working-directory: website
        run: npm ci --no-audit --no-fund

      - name: Build live site (root)
        working-directory: website
        run: npm run build

      - name: List dist
        working-directory: website
        run: ls -la dist

      - name: Build /old archive (legacy branch = previous site)
        run: |
          if [ -f legacy-src/website/package.json ]; then
            echo "Building legacy (previous site) at /old ..."
            cd legacy-src/website
            npm ci --no-audit --no-fund
            # legacy's vite.config hardcodes base "/", so force the base via CLI
            npx vite build --base=/old/
            node scripts/generate-static-pages.js
            mkdir -p "$GITHUB_WORKSPACE/website/dist/old"
            cp -r dist/. "$GITHUB_WORKSPACE/website/dist/old/"
            echo "Legacy site built into dist/old:"
            ls -la "$GITHUB_WORKSPACE/website/dist/old" | head
          else
            echo "No legacy branch checked out; skipping /old archive."
          fi

      # Deploy the built output (root site + /old archive) to Cloudflare Pages.
      # Replaces the previous GitHub Pages deploy (migrated 2026-06-13).
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/dist --project-name=alldonesites --branch=main
